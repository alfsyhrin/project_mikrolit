<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro Learning - Mikrolit LMS</title>
</head>
<body>
  <div class="container-micro-learning">
    <div class="container-topik-diskusi">
      
      <h2>
        Topik Diskusi
      </h2>
      
      <div class="wrapper-card-topik-diskusi">
        <!-- Akan diisi oleh renderDiskusiTopics() -->
      </div>

    </div>

    <div class="container-diskusi" id="containerDiskusi">
      <div style="display:flex; justify-content:space-between; align-items:center; width:100%; justify-content: center;">
        <h2 id="roomTitle" style="flex: 1;">Pilih Room</h2>

        <button id="btnFullscreenDiskusi">
          <span class="material-symbols-outlined">open_in_full</span>
        </button>
      </div>
      <div class="wrapper-card-pesan-diskusi">
        <!-- Akan diisi oleh renderDiskusiChat() -->
        <div style="padding: 40px 20px; text-align: center; color: #999; display: flex; align-items: center; justify-content: center; min-height: 400px;">
          <p>Silahkan pilih room diskusi untuk memulai</p>
        </div>
      </div>

      <div class="footer-container-diskusi">
        <input type="text" placeholder="Tulis balasan..." id="inputDiskusi">
        <button id="btnSendDiskusi">
          <p>
            <span class="material-symbols-outlined">send</span>
          </p>
        </button>
      </div>

    </div>
  </div>

</body>
</html>
