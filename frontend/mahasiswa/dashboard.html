    <script>
        document.addEventListener("DOMContentLoaded", async () => {

        // ==============================
        // ELEMENT
        // ==============================
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");
        const toggleBtn = document.getElementById("mobile-toggle");
        const collapseBtn = document.getElementById("collapseBtn");
        const content = document.querySelector(".content");
        const sidebarLinks = document.querySelectorAll(".sidebar-list a");
        const modulLinks = document.querySelectorAll(".container-modul-mahasiswa a");

        // ==============================
        // AUTH CHECK
        // ==============================
        if (!localStorage.getItem("token") || localStorage.getItem("role") !== "mahasiswa") {
            window.location.href = "index.html";
            return;
        }


        // Ambil profile langsung dari backend supaya realtime setelah update
        const token = localStorage.getItem("token");

        // helper: update navbar dari data profile
        function updateNavbarFromProfile(data) {
            document.getElementById("showName").innerText = data.name || localStorage.getItem("name") || "";
            document.getElementById("showNidn").innerText = data.nidn || localStorage.getItem("nidn") || "";

            const fotoEl = document.querySelector('.foto-profil');
            let src = null;
            if (data.photoData) src = data.photoData;
            else if (data.photo) src = data.photo + '?v=' + Date.now();

            if (src) {
                fotoEl.innerHTML = `<img id="navProfileImg" src="${src}" alt="Foto Profil" ">`;
                const img = document.getElementById('navProfileImg');
                img.onerror = function() {
                    this.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(data.name || localStorage.getItem('name') || 'User');
                };
            } else {
                fotoEl.innerHTML = '<span class="material-symbols-outlined">person</span>';
            }
        }

        try {
            const api = await import('../../../assets/api.js');
            const data = await api.getProfileRequest(token);

            // initial render
            updateNavbarFromProfile(data);

            // listen for updates emitted by pengaturan.js
            window.addEventListener('profileUpdated', (e) => {
                if (e && e.detail) updateNavbarFromProfile(e.detail);
            });
        } catch (err) {
            // Jika fetch gagal, gunakan localStorage sebagai cadangan
            console.error('Gagal fetch profile:', err);
            document.getElementById("showName").innerText = localStorage.getItem("name") || "";
            document.getElementById("showNidn").innerText = localStorage.getItem("nidn") || "";
        }

        // ==============================
        // LOAD PAGE FUNCTION
        // ==============================
        function loadPage(page, options = { pushState: true }) {
            // ✅ Handle 'modul-step' page (render step detail tanpa fetch HTML)
            if (page === 'modul-step' && options.moduleId && options.stepNumber) {
                console.log("[loadPage] Rendering step detail:", options.moduleId, options.stepNumber);
                setTimeout(() => {
                    window.renderStepDetail?.(options.moduleId, options.stepNumber);
                }, 50);
                return;  // Return - jangan lanjut ke fetch HTML
            }

            const APP_VERSION = "20260330-1";

            fetch(`./pages/${page}.html?v=${APP_VERSION}`, {
                cache: "no-store"
            })
                .then(response => {
                    if (!response.ok) throw new Error("404");
                    return response.text();
                })
                .then(data => {
                    content.innerHTML = data;

                    // Render modul detail jika halaman modul dengan moduleId
                    if (page === "modul" && options.moduleId) {
                        setTimeout(() => {
                            window.renderModuleDetail?.(options.moduleId);
                        }, 50);
                    }


                    // --- init/attach behavior pada halaman yg di-load ---
                    const modulCards = document.querySelectorAll(".card-modul-mahasiswa-menu");
                    const linkCards = document.querySelectorAll(".lanjut-belajar-modul");
                    const linkModul = document.querySelectorAll(".step-item");

                    modulCards.forEach(card => {
                        card.addEventListener("click", function(e) {
                            e.preventDefault();
                            const page = this.getAttribute("data-page");
                            const moduleId = this.getAttribute("data-module-id");

                            if (page) {
                                loadPage(page, { moduleId });
                            }
                        });
                    });

                    linkModul.forEach(card => {
                        card.addEventListener("click", function(e) {
                            e.preventDefault();

                            const page = this.getAttribute("data-page");
                            const moduleId = this.getAttribute("data-module-id");
                            const stepNumber = this.getAttribute("data-step-number");

                            if (page === "modul-step" && moduleId && stepNumber) {
                                loadPage("modul-step", { moduleId, stepNumber });
                                return;
                            }

                            if (page) {
                                loadPage(page, { moduleId });
                            }
                        });
                    });

                    if (page === "manajemen-pengguna") {
                        setTimeout(() => {
                            window.initManajemenPengguna();
                            window.fetchAndRenderUsers();
                        }, 50);
                    }
                    if (page === "daftar-modul") {
                        setTimeout(async () => {
                            await window.renderDaftarModul?.();
                        }, 50);
                    }
                    if (page === "tugas-mahasiswa") {
                        setTimeout(() => {
                            window.initManajemenTugasMhs();
                        }, 50);
                    }
                    if (page === "pengaturan") {
                        setTimeout(() => {
                            window.initPengaturan();
                        }, 50);
                    }
                    if (page === "diskusi") {
                        setTimeout(async () => {
                            window.initDiskusiFullscreen();
                            // ✅ Render list room diskusi dari API
                            await window.renderDiskusiTopics?.();
                        }, 50);
                    }
                    if (page === "beranda") {
                        setTimeout(() => {
                            renderChart();
                            renderMahasiswaChart();

                            if (window.renderBerandaModul) {
                                window.renderBerandaModul(3); // tampilkan 3 modul di beranda
                            }

                            if (window.fetchAndRenderDeadlineCards) {
                                window.fetchAndRenderDeadlineCards(token, '.wrapper-card-deadline-mhs', 4);
                            }

                            if (window.fetchAndRenderTaskSummary) {
                                window.fetchAndRenderTaskSummary(token);
                            }

                            if (window.fetchAndRenderNotifications) {
                                window.fetchAndRenderNotifications(token, '.wrapper-card-notifikasi-mhs', 5);
                            }
                        }, 50);
                    } else if (page === "progress-evaluasi") {
                        setTimeout(() => {
                            renderKemampuanLiterasiChart();

                            if (window.renderProgressEvaluasiPage) {
                                window.renderProgressEvaluasiPage();
                            }

                            if (window.fetchAndRenderTaskStats) {
                                window.fetchAndRenderTaskStats(token);
                            }
                        }, 50);
                    }
                    // --- akhir init ---

                    // Update sidebar active link
                    sidebarLinks.forEach(item => item.classList.remove("active"));
                    const sidebarLink = document.querySelector(`.sidebar-list a[data-page="${page}"]`);
                    if (sidebarLink) sidebarLink.classList.add("active");

                    // Optional: update navbar title if you want
                    const navTitle = document.querySelector('.navbar-kiri h2');
                    if (navTitle) {
                        // simple mapping or just show page name
                        navTitle.textContent = page.replace('-', ' ').replace(/\b\w/g, c => c.toUpperCase());
                    }

                    // Push history state so back/forward works
                    if (options.pushState && history && history.pushState) {
                        history.pushState({ page }, '', `#${page}`);
                    }
                })
                .catch(() => {
                    content.innerHTML = "<h2>Halaman tidak ditemukan</h2>";
                });
        }

        window.addEventListener('popstate', function(e) {
            const page = (e.state && e.state.page) || 'beranda';
            loadPage(page, { pushState: false });
        });

        // Intercept any link that uses data-page (except sidebar links which already have handlers)
        document.addEventListener('click', function(e){
            
            // ✅ TAMBAH INI DI AWAL: Handle step-item clicks (prioritas tinggi)
            const stepItem = e.target.closest('.step-item');
            if (stepItem) {
                e.preventDefault();
                const moduleId = stepItem.getAttribute('data-module-id');
                const stepNumber = stepItem.getAttribute('data-step-number');
                const status = stepItem.getAttribute('data-status');
                
                if (moduleId && stepNumber) {
                    if (status === 'locked' || status === 'terkunci') {
                        alert('Step ini masih terkunci. Selesaikan langkah sebelumnya terlebih dahulu.');
                        return;
                    }
                    loadPage('modul-step', { moduleId, stepNumber });
                }
                return;
            }

            // ✅ EXISTING CODE TETAP: original a[data-page] handler (jangan diubah)
            const a = e.target.closest('a[data-page]');
            if (!a) return;
            if (a.closest('.sidebar-list')) return;
            e.preventDefault();
            const page = a.getAttribute('data-page');
            const moduleId = a.getAttribute('data-module-id');
            loadPage(page, { moduleId });
        });
        // ==============================
        // SIDEBAR LINK CLICK
        // ==============================
        sidebarLinks.forEach(link => {
            link.addEventListener("click", function (e) {
            e.preventDefault();

            const page = this.getAttribute("data-page");

            // Load page
            loadPage(page);

            // Set active
            sidebarLinks.forEach(item => item.classList.remove("active"));
            this.classList.add("active");

            // Tutup sidebar jika mobile
            if (window.innerWidth <= 768) {
                sidebar.classList.remove("active");
                overlay.classList.remove("active");
            }
            });
        });

        // ==============================
        // MOBILE TOGGLE
        // ==============================
        toggleBtn.addEventListener("click", () => {
            sidebar.classList.add("active");
            overlay.classList.add("active");
        });

        // ==============================
        // CLICK OUTSIDE (OVERLAY)
        // ==============================
        overlay.addEventListener("click", () => {
            sidebar.classList.remove("active");
            overlay.classList.remove("active");
        });

        // ==============================
        // COLLAPSE DESKTOP
        // ==============================
        collapseBtn.addEventListener("click", () => {
            sidebar.classList.toggle("collapsed");

            if (sidebar.classList.contains("collapsed")) {
            collapseBtn.innerHTML = `
                <span class="material-symbols-outlined">chevron_right</span>
            `;
            } else {
            collapseBtn.innerHTML = `
                <span class="material-symbols-outlined">chevron_left</span>
                <span class="text">Collapse</span>
            `;
            }
        });

        // ==============================
        // HANDLE RESIZE
        // ==============================
        window.addEventListener("resize", () => {
            if (window.innerWidth > 768) {
            overlay.classList.remove("active");
            sidebar.classList.remove("active");
            }
        });

        // ==============================
        // LOAD DEFAULT PAGE
        // ==============================
        const defaultPage = "beranda";
        loadPage(defaultPage);

        const defaultLink = document.querySelector(
            `.sidebar-list a[data-page="${defaultPage}"]`
        );

        if (defaultLink) {
            defaultLink.classList.add("active");
        }

        // ✅ Expose loadPage ke global scope (supaya daftar-modul.js bisa pakai)
        window.loadPage = loadPage;

        });  // closing of DOMContentLoaded
    </script>
