<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - MikroLit LMS</title>

    <!-- Link ke CSS Halaman ini (login.css) -->
    <link rel="stylesheet" href="../assets/css/lupa-password-sandibaru.css">

    <!-- Link ke CSS global -->
    <link rel="stylesheet" href="../../assets/main.css">

    <!-- Link untuk mengakses icon material symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=school" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <!-- Link untuk mengakses font google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Link untuk mengakses font 'ASAP' dari google -->
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Sarina&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <!-- Judul Halaman -->
        <div class="container-judul-aplikasi slide-in-top">
            <p class="icon-mikrolit"><span class="material-symbols-outlined">school</span></p>
            <h1>MikroLit LMS</h1>
            <p>Learning Management System</p>
        </div>
    
        <div class="login-container">
            <div class="login-box fade-in">
                <h2>Password Baru</h2>
                <form>
                    
                    <label for="password1">Masukkan password baru anda</label>
                    <div class="password-wrapper" style="margin-bottom: 1rem;">
                        <input type="password" id="password1" placeholder="Password" required>

                        <span class="material-symbols-outlined toggle-password" id="togglePassword1">
                            visibility
                        </span>
                    </div>

                    <label for="password2">Masukkan kembali password baru anda</label>
                    <div class="password-wrapper">
                        <input type="password" id="password2" placeholder="Password" required>

                        <span class="material-symbols-outlined toggle-password" id="togglePassword2">
                            visibility
                        </span>
                    </div>

                    <div id="loginMessage" style="margin-top: 10px; text-align: center;"></div>

                    
                    <button type="submit">Ubah Password</button>
                </form>
    
    
                <!-- <p id="loginMessage"></p> -->
            </div>
        </div>
    </main>
    <script>
        const togglePassword1 = document.getElementById('togglePassword1');
        const togglePassword2 = document.getElementById('togglePassword2');
        const passwordInput1 = document.getElementById('password1');
        const passwordInput2 = document.getElementById('password2');

        togglePassword1.addEventListener('click', function () {
            const type = passwordInput1.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput1.setAttribute('type', type);

            // ganti icon
            this.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });

        togglePassword2.addEventListener('click', function () {
            const type = passwordInput2.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput2.setAttribute('type', type);

            // ganti icon
            this.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
</body>
</html>
