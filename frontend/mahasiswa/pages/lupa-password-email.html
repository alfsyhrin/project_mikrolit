<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - MikroLit LMS</title>

    <!-- Link ke CSS Halaman ini (login.css) -->
    <link rel="stylesheet" href="../assets/css/lupa-password-email.css">

    <!-- Link ke CSS global -->
    <link rel="stylesheet" href="../../assets/main.css">

    <!-- Link untuk mengakses icon material symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=school" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <!-- Link untuk mengakses font google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Link untuk mengakses font 'ASAP' dari google -->
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Sarina&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <!-- Judul Halaman -->
        <div class="container-judul-aplikasi slide-in-top">
            <p class="icon-mikrolit"><span class="material-symbols-outlined">school</span></p>
            <h1>MikroLit LMS</h1>
            <p>Learning Management System</p>
        </div>
    
        <div class="login-container">
            <div class="login-box fade-in">
                <h2>Verifikasi Email</h2>
                <form>
                    <label for="email">Masukkan email anda</label>
                    <input type="email" id="email" placeholder="example@gmail.com" required>
                    <label for="email">Masukkan kembali email anda</label>
                    <div class="password-wrapper">
                        <input type="email" id="password" placeholder="example@gmail.com" required>
                    </div>

                    <div id="loginMessage" style="margin-top: 10px; text-align: center;"></div>

                    
                    <button type="submit">Kirim</button>
                </form>
    
    
                <!-- <p id="loginMessage"></p> -->
            </div>
        </div>
    </main>
</body>
</html>
