<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - MikroLit LMS</title>

    <!-- Link ke CSS Halaman ini (login.css) -->
    <link rel="stylesheet" href="../assets/css/lupa-password-otp.css">

    <!-- Link ke CSS global -->
    <link rel="stylesheet" href="../../assets/main.css">

    <!-- Link untuk mengakses icon material symbols -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=school" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <!-- Link untuk mengakses font google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Link untuk mengakses font 'ASAP' dari google -->
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Sarina&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <!-- Judul Halaman -->
        <div class="container-judul-aplikasi slide-in-top">
            <p class="icon-mikrolit"><span class="material-symbols-outlined">school</span></p>
            <h1>MikroLit LMS</h1>
            <p>Learning Management System</p>
        </div>
    
        <div class="login-container">
            <div class="login-box fade-in">
                <h2>One Time Password</h2>
                <label class="label">Masukkan kode OTP</label>
                <form>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-input" required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-input"  required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-input"  required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-input"  required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-input"  required>
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-input"  required>
                    
                    <!-- <div id="loginMessage" style="margin-top: 10px; text-align: center;"></div> -->

                    
                </form>
                <button type="submit" class="btn">Kirim</button>
    
    
                <!-- <p id="loginMessage"></p> -->
            </div>
        </div>
    </main>
    <script type="module" src="../assets/js/lupa-password-otp.js"></script>
    <script>
        document.querySelectorAll('.otp-input').forEach(input => {
            input.addEventListener('input', function () {
                this.value = this.value.replace(/[^0-9]/g, '').slice(0,1);
            });
        });
    </script>
    <script>
        const inputs = document.querySelectorAll('.otp-input');

            inputs.forEach((input, index) => {
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '').slice(0,1);

                    if (this.value && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
    </script>
</body>
</html>
