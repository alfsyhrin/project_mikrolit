<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro Learning - Mikrolit LMS</title>

  <!-- Link ke Global CSS -->
  <link rel="stylesheet" href="../assets/css/main.css">

  <!-- Link ke CSS halaman ini (micro-learning.css) -->
  <link rel="stylesheet" href="../assets/css/micro-learning.css">

  <!-- Link untuk mengakses icon material symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <!-- Link untuk mengakses font google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Link untuk mengakses font 'ASAP' dari google -->
  <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Sarina&display=swap" rel="stylesheet">
  
</head>
<body>
  <div class="container-micro-learning">

    <header>
      <div class="search-bar">
        <p><span class="material-symbols-outlined">search</span></p>
        <input type="text" placeholder="Cari modul..." id="searchMahasiswa">
      </div>
      <button class="buat-modul">
        <span class="material-symbols-outlined">add</span>
        Buat Modul
      </button>
    </header>
    
    <div class="card-template-modul">

      <div class="card-modul">
        <p>
          <span class="material-symbols-outlined pertama">play_circle</span>
        </p>
        <p class="judul-modul">Inisiasi/Lit Starter</p>
      </div>

      

      <div class="card-modul">
        <p>
          <span class="material-symbols-outlined kedua">book_5</span>
        </p>
        <p class="judul-modul">Micro-Reader</p>
      </div>

      <div class="card-modul">
        <p>
          <span class="material-symbols-outlined ketiga">sync</span>
        </p>
        <p class="judul-modul">Reflect-Sync</p>
      </div>

      <div class="card-modul">
        <p>
          <span class="material-symbols-outlined keempat">article</span>
        </p>
        <p class="judul-modul">Micro-Writing</p>
      </div>

      <div class="card-modul">
        <p>
          <span class="material-symbols-outlined kelima">group</span>
        </p>
        <p class="judul-modul">Peer Review</p>
      </div>

      <div class="card-modul">
        <p>
          <span class="material-symbols-outlined keenam">chat_bubble</span>
        </p>
        <p class="judul-modul">Umpan Balik</p>
      </div>

    </div>

  </div>
</body>
</html>
